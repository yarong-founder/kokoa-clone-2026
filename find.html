<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="css/styles.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Find - Kokoa Clone</title>
    </head>
    <body>
        <div class="status-bar">
            <div class="status-bar__column">
                <span>No Service</span>
                <i class="fa-solid fa-wifi"></i>
            </div>
            <div class="status-bar__column">
                <span>18:43</span>
            </div>
            <div class="status-bar__column">
                <span>110%</span>
                <i class="fa-solid fa-battery-full fa-lg"></i>
                <i class="fa-solid fa-bolt-lightning"></i>
            </div>
        </div>

        <header class="screen-header">
            <h1 class="screen-header__title">Find</h1>
            <div class="screen-header__icons">
                <span><i class="fa-solid fa-magnifying-glass fa-2x"></i></span>
                <span><i class="fa-solid fa-gear fa-2x"></i></span>
            </div>
        </header>

        <main class="main-screen">
           <div class="icon-row">
                <div class="icon-row__icon">
                    <i class="fa-solid fa-qrcode fa-3x"></i>
                    <span>QR Code</span>
                </div>
                <div class="icon-row__icon">
                    <i class="fa-regular fa-address-book fa-3x"></i>
                    <span>Add by Contacts</span>
                </div>
                <div class="icon-row__icon">
                    <i class="fa-solid fa-fingerprint fa-3x"></i>
                    <span>Add by ID</span>
                </div>
                <div class="icon-row__icon">
                    <i class="fa-regular fa-envelope fa-3x"></i>
                    <span>Invite</span>
                </div>

           </div>
           <div class="recommended-freinds">
                <h6 class="recommended-freinds__title">Recommended Freinds</h6>
                <span>You have no recommended friends.</span>
           </div>
           <div class="open-chat">
                <div class="open-chat__header">
                    <h4 class="open-chat__title">Open Chat</h4>
                    <span>Go to Openchat Home<i class="fa-solid fa-chevron-right fa-xs"></i></span>
                    
                </div>
                <div class="open-post">
                    <div class="open-post__column">
                        <h5 class="open-post__title">#ROSALÍA</h5>
                        <h6 class="open-post__hashtags">#rosalia#latinpop#lux</h6>
                        <div class="open-post__members">
                            <img src="https://yt3.ggpht.com/u1DLkHa1kw8ZX39iA5H8-U8J5we1CY9abjrcE8M4-weAWlINKi4rV9c-if88s7qDIjplyOwWYw=s88-c-k-c0x00ffffff-no-rj" />
                            <span class="open-post__member-count">802 members</span>
                            <div class="divider"></div>
                            <span class="open-post__member-status">Active</span>
                        </div>
                    </div>
                    <div class="open-post__column">
                        <div class="open-post__photo">
                            <img src="https://yt3.googleusercontent.com/dTpYWRisnoZ56BD2GCI_DblY8iJdhwAEg3IAlqbVfn0zBuZBNFBFmX8ZH-OwNV3Cq2k1zojPYcMVgz7e=w544-h544-l90-rj" />
                            <div class="open-post__heart-count">
                                <i class="fa-solid fa-heart fa-xs"></i>
                                <span>326</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="open-post">
                    <div class="open-post__column">
                        <h5 class="open-post__title">#ROSALÍA</h5>
                        <h6 class="open-post__hashtags">#rosalia#latinpop#lux</h6>
                        <div class="open-post__members">
                            <img src="https://yt3.ggpht.com/u1DLkHa1kw8ZX39iA5H8-U8J5we1CY9abjrcE8M4-weAWlINKi4rV9c-if88s7qDIjplyOwWYw=s88-c-k-c0x00ffffff-no-rj" />
                            <span class="open-post__member-count">802 members</span>
                            <div class="divider"></div>
                            <span class="open-post__member-status">Active</span>
                        </div>
                    </div>
                    <div class="open-post__column">
                        <div class="open-post__photo">
                            <img src="https://yt3.googleusercontent.com/dTpYWRisnoZ56BD2GCI_DblY8iJdhwAEg3IAlqbVfn0zBuZBNFBFmX8ZH-OwNV3Cq2k1zojPYcMVgz7e=w544-h544-l90-rj" />
                            <div class="open-post__heart-count">
                                <i class="fa-solid fa-heart fa-xs"></i>
                                <span>326</span>
                            </div>
                        </div>
                    </div>
                </div>
           </div>
            
        </main>



        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__btn">
                    <a class="nav__link" href="freinds.html"
                        ><i class="fa-regular fa-user fa-2x"></i>
                    </a>
                </li>
                <li class="nav__btn">
                    <a class="nav__link" href="chats.html">
                        <span class="nav__notification badge">1</span>
                        <i class="fa-regular fa-comment fa-2x"></i>
                    </a>
                </li>
                <li class="nav__btn">
                    <a class="nav__link" href="find.html"
                        ><i class="fa-solid fa-magnifying-glass fa-2x"></i
                    ></a>
                </li>
                <li class="nav__btn">
                    <a class="nav__link" href="more.html"
                        ><i class="fa-solid fa-ellipsis fa-2x"></i
                        ></a>
                </li>
            </ul>
        </nav>
        <div id="no-mobile">
            <span>Your screen is too big!!</span>
        </div>
        <script 
            src="https://kit.fontawesome.com/6bb27ed3c1.js" 
            crossorigin="anonymous"
            data-auto-replace-svg="nest"
        ></script>
    </body>
</html>
